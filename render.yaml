services:
  # ─── Backend API (Node.js / Express) ──────────────────────────────────────
  - type: web
    name: namkeen-api
    plan: free              # <--- આનાથી બેકએન્ડ સાવ ફ્રી થઈ જશે
    runtime: node
    region: singapore
    rootDir: artifacts/api-server
    buildCommand: cd ../.. && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps ./dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false          # Paste your Postgres URL in dashboard
      - key: SESSION_SECRET
        generateValue: true  # Auto-generated by Render
      - key: CORS_ORIGIN
        sync: false          # Set to your frontend URL

  # ─── Frontend (React / Vite static site) ───────────────────────────────────
  - type: web
    name: namkeen-frontend
    plan: free              # <--- આનાથી ફ્રન્ટએન્ડ પણ સાવ ફ્રી થઈ જશે
    runtime: static
    rootDir: artifacts/namkeen
    buildCommand: cd ../.. && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-spec run codegen && pnpm --filter @workspace/namkeen run build
    staticPublishPath: dist/public
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_ENV
        value: production